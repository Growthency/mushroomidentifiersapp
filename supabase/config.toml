# MushroomIdentifiers — Supabase project config
# Linked to project: tsbxbtajtzfvianasoaw

project_id = "tsbxbtajtzfvianasoaw"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "mushroomid://"
additional_redirect_urls = [
  "mushroomid://auth/callback",
  "https://mushroomidentifiers.com",
  "http://localhost:8081",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Google OAuth is configured in the Supabase dashboard, not locally.

[functions.identify-mushroom]
verify_jwt = true

[functions.revenuecat-webhook]
verify_jwt = false
